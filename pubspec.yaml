name: dt_tracker_ai
description: "DT Tracker - Real-time GPS Vehicle Tracking App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_database: ^11.2.0
  firebase_storage: ^12.4.0
  firebase_messaging: ^15.2.0

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^8.0.3

  # Maps & Location
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Background Services
  flutter_background_service: ^5.1.0
  workmanager: ^0.5.2

  # Networking & Functional
  dartz: ^0.10.1
  connectivity_plus: ^6.1.1

  # Local Storage
  shared_preferences: ^2.3.4

  # Routing
  go_router: ^14.6.3

  # UI Components
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  permission_handler: ^11.3.1

  # Notifications (local)
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
